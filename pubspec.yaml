name: dt_digital_studio
description: DTDigitalStudio — production-ready Flutter base project.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Network
  dio: ^5.8.0+1
  retrofit: ^4.4.2

  # Local storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  hive_ce: 2.19.3
  hive_ce_flutter: ^2.3.4

  # Image
  cached_network_image: ^3.4.1

  # Utils
  logger: ^2.5.0
  connectivity_plus: ^6.1.4
  device_info_plus: ^11.3.3
  package_info_plus: ^8.3.0
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  intl: ^0.20.0

  # UI / UX enhancements
  google_fonts: ^8.0.1
  loading_indicator: ^3.1.1
  shimmer: ^3.0.0
  reactive_forms: ^18.1.1
  infinite_scroll_pagination: ^5.1.1
  dropdown_button2: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.2.3
  hive_ce_generator: ^1.8.1
  custom_lint: ^0.7.4
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/gen/
  line_length: 120
